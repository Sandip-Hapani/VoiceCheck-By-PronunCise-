name: Deploy backend to Google Cloud Run

# Cloud Run runs your actual Dockerfile as a container — free tier: 2M
# requests/month, 360,000 GiB-seconds memory, 180,000 vCPU-seconds. Needs a
# GCP project with billing enabled (Google requires a card on file, but you
# won't be charged while you stay inside the free tier).
#
# One-time setup (see README "Deploying for free"):
#   1. Create a GCP project; enable the Cloud Run and Artifact Registry APIs.
#   2. Create an Artifact Registry Docker repo:
#        gcloud artifacts repositories create voicecheck \
#          --repository-format=docker --location=<region>
#   3. Create a deploy service account with roles: Cloud Run Admin,
#      Artifact Registry Writer, Service Account User. Download its JSON key.
#   4. Add repo secrets: GCP_PROJECT_ID, GCP_REGION (e.g. us-central1),
#      GCP_SA_KEY (the full JSON key contents).
#   5. After the first deploy, set the runtime secrets/env vars once —
#      they persist across future deploys since this workflow never passes
#      --set-env-vars (Cloud Run carries forward whatever isn't touched):
#        gcloud run services update voicecheck-backend --region=<region> \
#          --set-env-vars=CORS_ORIGINS=...,PUBLIC_BASE_URL=... \
#          --set-secrets=GROQ_API_KEY=groq-api-key:latest
#   6. Grant the Cloud Run runtime service account Firestore access (IAM role
#      "Cloud Datastore User") so firebase-admin's Application Default
#      Credentials fallback works with no service-account JSON at all.

on:
  push:
    branches: [prod]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      REGION: ${{ secrets.GCP_REGION }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      SERVICE: voicecheck-backend
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/voicecheck/backend:${{ github.sha }}"
          docker build -t "$IMAGE" backend
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          project_id: ${{ env.PROJECT_ID }}
          # --no-cpu-throttling: BackgroundTasks (transcribe -> feedback ->
          # Firestore write) keep running after the HTTP response is sent —
          # default CPU throttling would starve that work.
          flags: --memory=2Gi --cpu=2 --no-cpu-throttling --timeout=300 --allow-unauthenticated --min-instances=0
