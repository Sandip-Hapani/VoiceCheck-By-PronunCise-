name: Deploy backend to Google Cloud Run

# Cloud Run runs your actual Dockerfile as a container — free tier: 2M
# requests/month, 360,000 GiB-seconds memory, 180,000 vCPU-seconds. Needs a
# GCP project with billing enabled (Google requires a card on file, but you
# won't be charged while you stay inside the free tier).
#
# One-time setup (see README "Deploying for free"):
#   1. Create a GCP project; enable the Cloud Run and Artifact Registry APIs.
#   2. Create an Artifact Registry Docker repo:
#        gcloud artifacts repositories create voicecheck \
#          --repository-format=docker --location=<region>
#   3. Create a deploy service account with roles Cloud Run Admin,
#      Artifact Registry Writer, Service Account User on this project (it can
#      live in a different project and be granted these cross-project, e.g.
#      if key creation is blocked here by org policy). Download its JSON key
#      -> GCP_SA_KEY secret.
#   4. Create a dedicated runtime service account ("voicecheck-runtime") for
#      the Cloud Run service itself and grant it Firestore access (IAM role
#      "Cloud Datastore User") on whichever project hosts your Firestore
#      database. Referenced below via --service-account.
#   5. Add repo secrets: GCP_PROJECT_ID, GCP_REGION (e.g. us-central1),
#      GCP_SA_KEY (the deploy service account's JSON key contents).
#   6. Add repo secrets for the app's own runtime config (every deploy
#      re-declares the full env var set from these, so there's nothing to
#      run manually afterwards): GROQ_API_KEY, FIRESTORE_PROJECT_ID,
#      PUBLIC_BASE_URL (this service's own Cloud Run URL), CORS_ORIGINS
#      (comma-separated frontend origins). Optional, for persistent audio
#      storage: R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY,
#      R2_BUCKET_NAME, R2_PUBLIC_BASE_URL — leave unset to fall back to
#      ephemeral local disk.

on:
  push:
    branches: [prod]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      REGION: ${{ secrets.GCP_REGION }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      SERVICE: voicecheck-backend
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/voicecheck/backend:${{ github.sha }}"
          docker build -t "$IMAGE" backend
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      # Declarative env vars file: every deploy re-applies the full set, so
      # the running service can never drift from what's in repo secrets (no
      # more manual `gcloud run services update` after the fact). Using a
      # YAML file (rather than the env_vars input's KEY=VALUE,KEY=VALUE
      # string) sidesteps escaping commas inside CORS_ORIGINS.
      # Using R2 Storage for audio file persistence is optional — if the R2_ vars are left
      # unset, the app will fall back to using local disk (which is ephemeral but free and requires no credentials).
      - name: Write Cloud Run env vars
        run: |
          cat <<EOF > /tmp/cloudrun-env.yaml
          GROQ_API_KEY: "${{ secrets.GROQ_API_KEY }}"
          FIRESTORE_PROJECT_ID: "${{ secrets.FIRESTORE_PROJECT_ID }}"
          PUBLIC_BASE_URL: "${{ secrets.PUBLIC_BASE_URL }}"
          CORS_ORIGINS: "${{ secrets.CORS_ORIGINS }}"
          R2_ACCOUNT_ID: "${{ secrets.R2_ACCOUNT_ID }}"
          R2_ACCESS_KEY_ID: "${{ secrets.R2_ACCESS_KEY_ID }}"
          R2_SECRET_ACCESS_KEY: "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          R2_BUCKET_NAME: "${{ secrets.R2_BUCKET_NAME }}"
          R2_PUBLIC_BASE_URL: "${{ secrets.R2_PUBLIC_BASE_URL }}"
          EOF

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          project_id: ${{ env.PROJECT_ID }}
          env_vars_file: /tmp/cloudrun-env.yaml
          # --no-cpu-throttling: BackgroundTasks (transcribe -> feedback ->
          # Firestore write) keep running after the HTTP response is sent —
          # default CPU throttling would starve that work.
          # --service-account: a dedicated, least-privilege runtime identity
          # (granted Firestore access only) rather than the implicit default
          # compute service account.
          flags: --memory=2Gi --cpu=2 --no-cpu-throttling --timeout=300 --allow-unauthenticated --min-instances=0 --service-account=voicecheck-runtime@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
